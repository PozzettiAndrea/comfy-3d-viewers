<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD Hierarchy Tree Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-size: 12px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        /* 3D viewport panel */
        .viewport-panel {
            position: relative;
            flex: 0 0 45%;
            min-height: 120px;
            background: #0d0d0d;
            border-bottom: 1px solid #333;
        }

        .viewport-panel canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .viewport-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #555;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }

        .viewport-legend {
            position: absolute;
            bottom: 6px;
            left: 8px;
            font-size: 10px;
            color: #999;
            display: flex;
            gap: 12px;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 3px 8px;
            border-radius: 3px;
        }

        .viewport-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .viewport-legend .swatch {
            width: 9px;
            height: 9px;
            border-radius: 2px;
            display: inline-block;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Tree panel */
        .tree-panel {
            flex: 1;
            overflow: auto;
            padding: 12px;
            background: #1e1e1e;
        }

        /* Summary panel */
        .summary-panel {
            width: 280px;
            background: #252525;
            border-left: 1px solid #333;
            padding: 16px;
            overflow-y: auto;
        }

        .summary-panel h3 {
            color: #4a9eff;
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        .summary-section {
            margin-bottom: 20px;
        }

        .summary-section h4 {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            color: #fff;
            font-weight: 500;
        }

        /* Tree styles */
        .tree-node {
            margin-left: 16px;
            position: relative;
        }

        .tree-node::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 0;
            height: 100%;
            width: 1px;
            background: #333;
        }

        .tree-node:last-child::before {
            height: 12px;
        }

        .tree-node::after {
            content: '';
            position: absolute;
            left: -12px;
            top: 12px;
            width: 10px;
            height: 1px;
            background: #333;
        }

        .tree-root {
            margin-left: 0;
        }

        .tree-root::before,
        .tree-root::after {
            display: none;
        }

        .node-header {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
            margin: 2px 0;
        }

        .node-header:hover {
            background: #2a2a2a;
        }

        .node-header.selected {
            background: #1e3a5f;
        }

        .toggle-btn {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            color: #666;
            font-size: 10px;
            flex-shrink: 0;
        }

        .toggle-btn.has-children {
            color: #888;
            cursor: pointer;
        }

        .toggle-btn.has-children:hover {
            color: #fff;
        }

        .node-icon {
            width: 18px;
            height: 18px;
            margin-right: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
        }

        .node-type {
            font-weight: 500;
            margin-right: 8px;
        }

        .node-props {
            color: #888;
            font-size: 11px;
        }

        .node-count {
            color: #666;
            font-size: 10px;
            margin-left: auto;
            padding-left: 8px;
        }

        .children-container {
            display: block;
        }

        .children-container.collapsed {
            display: none;
        }

        /* Type colors */
        .type-COMPOUND .node-icon { color: #ff9800; }
        .type-COMPSOLID .node-icon { color: #ff5722; }
        .type-SOLID .node-icon { color: #4caf50; }
        .type-SHELL .node-icon { color: #2196f3; }
        .type-FACE .node-icon { color: #9c27b0; }
        .type-WIRE .node-icon { color: #00bcd4; }
        .type-EDGE .node-icon { color: #ffeb3b; }
        .type-VERTEX .node-icon { color: #f44336; }

        .type-COMPOUND .node-type { color: #ff9800; }
        .type-COMPSOLID .node-type { color: #ff5722; }
        .type-SOLID .node-type { color: #4caf50; }
        .type-SHELL .node-type { color: #2196f3; }
        .type-FACE .node-type { color: #9c27b0; }
        .type-WIRE .node-type { color: #00bcd4; }
        .type-EDGE .node-type { color: #ffeb3b; }
        .type-VERTEX .node-type { color: #f44336; }

        /* Icons */
        .icon-compound::before { content: ''; }
        .icon-solid::before { content: ''; }
        .icon-shell::before { content: ''; }
        .icon-face::before { content: ''; }
        .icon-wire::before { content: ''; }
        .icon-edge::before { content: ''; }
        .icon-vertex::before { content: ''; }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #252525;
            border-bottom: 1px solid #333;
        }

        .toolbar button {
            padding: 6px 12px;
            background: #333;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .toolbar button:hover {
            background: #444;
            color: #fff;
        }

        .toolbar input {
            flex: 1;
            max-width: 200px;
            padding: 6px 10px;
            background: #1e1e1e;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            font-size: 11px;
        }

        .toolbar input::placeholder {
            color: #666;
        }

        /* Filter dropdown */
        .filter-dropdown {
            padding: 6px 10px;
            background: #333;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
        }

        /* Pie chart placeholder */
        .pie-chart {
            width: 100%;
            height: 120px;
            background: #1e1e1e;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            padding: 8px;
            gap: 4px;
        }

        .pie-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 4px 8px;
            background: #2a2a2a;
            border-radius: 4px;
        }

        .pie-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        /* Truncated indicator */
        .truncated-indicator {
            color: #ff9800;
            font-size: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search (type or property)...">
        <select class="filter-dropdown" id="filterType">
            <option value="">All Types</option>
            <option value="COMPOUND">Compounds</option>
            <option value="SOLID">Solids</option>
            <option value="SHELL">Shells</option>
            <option value="FACE">Faces</option>
            <option value="WIRE">Wires</option>
            <option value="EDGE">Edges</option>
        </select>
        <button id="expandAllBtn">Expand All</button>
        <button id="collapseAllBtn">Collapse All</button>
        <button id="fitViewBtn">Fit View</button>
        <button id="copyJsonBtn">Copy JSON</button>
    </div>

    <div class="main-area">
        <div class="viewport-panel" id="viewportPanel">
            <div class="viewport-hint" id="viewportHint">Waiting for model...</div>
            <div class="viewport-legend">
                <span><span class="swatch" style="background:#ffaa00"></span>selected face</span>
                <span><span class="swatch" style="background:#00e5ff"></span>selected edge</span>
            </div>
        </div>

        <div class="container">
            <div class="tree-panel" id="treePanel">
                <div class="loading">Waiting for hierarchy data...</div>
            </div>

            <div class="summary-panel" id="summaryPanel">
                <h3>Summary</h3>
                <div class="summary-section">
                    <h4>Entity Counts</h4>
                    <div id="entityCounts"></div>
                </div>
                <div class="summary-section">
                    <h4>Surface Types</h4>
                    <div class="pie-chart" id="surfaceTypes"></div>
                </div>
                <div class="summary-section">
                    <h4>Curve Types</h4>
                    <div class="pie-chart" id="curveTypes"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js for the 3D viewport (bundled locally) -->
    <script src="three/three.min.js"></script>
    <script src="three/OrbitControls.js"></script>

    <!-- VTK.js, used only for its VTP XML parser (not for rendering) -->
    <script src="js/vtk-gltf.js"></script>

    <script>
        const vtkXMLPolyDataReader = vtk.IO.XML.vtkXMLPolyDataReader;

        let hierarchyData = null;
        let allNodeElements = [];
        let selectedHeader = null;

        // ---- Three.js viewport state ----
        let scene, camera, renderer, controls;
        let faceMesh = null;          // THREE.Mesh, all CAD faces as one indexed geometry
        let faceTriangleIds = null;   // Int32Array, per-triangle FaceID (== tree geom_id)
        let edgeLines = new Map();    // edge_id (tree geom_id) -> THREE.Line
        let highlightMeshes = [];     // overlay meshes for selected faces
        let highlightLines = [];      // overlay lines for selected edges

        // Type icons (using unicode symbols)
        const TYPE_ICONS = {
            'COMPOUND': '■',   // Square
            'COMPSOLID': '■',
            'SOLID': '▦',      // Cube-ish
            'SHELL': '□',      // Empty square
            'FACE': '△',       // Triangle (surface)
            'WIRE': '○',       // Circle
            'EDGE': '—',       // Line
            'VERTEX': '•',     // Dot
        };

        // Colors for pie charts
        const SURFACE_COLORS = {
            'Plane': '#4caf50',
            'Cylinder': '#2196f3',
            'Cone': '#ff9800',
            'Sphere': '#9c27b0',
            'Torus': '#e91e63',
            'Bezier': '#00bcd4',
            'BSpline': '#ff5722',
            'Revolution': '#795548',
            'Extrusion': '#607d8b',
            'Other': '#666',
        };

        const CURVE_COLORS = {
            'Line': '#4caf50',
            'Circle': '#2196f3',
            'Ellipse': '#ff9800',
            'Hyperbola': '#9c27b0',
            'Parabola': '#e91e63',
            'Bezier': '#00bcd4',
            'BSpline': '#ff5722',
            'Other': '#666',
        };

        // ============================================================
        // 3D viewport
        // ============================================================

        function initViewport() {
            const panel = document.getElementById('viewportPanel');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d0d0d);

            camera = new THREE.PerspectiveCamera(50, panel.clientWidth / panel.clientHeight, 0.01, 1e7);
            camera.position.set(1, 1, 1);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            renderer.setSize(panel.clientWidth, panel.clientHeight);
            panel.insertBefore(renderer.domElement, panel.firstChild);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.1));
            const dir = new THREE.DirectionalLight(0xffffff, 0.6);
            dir.position.set(1, 2, 1.5);
            scene.add(dir);

            window.addEventListener('resize', () => {
                if (!panel.clientWidth || !panel.clientHeight) return;
                camera.aspect = panel.clientWidth / panel.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(panel.clientWidth, panel.clientHeight);
            });

            (function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            })();
        }

        // Parse a VTP of triangles with a "FaceID" cell-data array
        function parseFaceMeshVTP(arrayBuffer) {
            const reader = vtkXMLPolyDataReader.newInstance();
            reader.parseAsArrayBuffer(arrayBuffer);
            const polydata = reader.getOutputData(0);
            if (!polydata) throw new Error('Failed to parse mesh VTP');

            const vertices = Array.from(polydata.getPoints().getData());

            const polysData = polydata.getPolys().getData();
            const indices = [];
            let i = 0;
            while (i < polysData.length) {
                const npts = polysData[i++];
                if (npts === 3) indices.push(polysData[i], polysData[i + 1], polysData[i + 2]);
                i += npts;
            }

            const faceIdArray = polydata.getCellData().getArrayByName('FaceID');
            const faceIds = faceIdArray ? Array.from(faceIdArray.getData()) : [];

            return { vertices, indices, faceIds };
        }

        // Parse a VTP of polylines with an "edge_id" cell-data array (one cell = one edge)
        function parseEdgeVTP(arrayBuffer) {
            const reader = vtkXMLPolyDataReader.newInstance();
            reader.parseAsArrayBuffer(arrayBuffer);
            const polydata = reader.getOutputData(0);
            if (!polydata) throw new Error('Failed to parse edges VTP');

            const pointsData = polydata.getPoints().getData();
            const linesData = polydata.getLines().getData();
            const edgeIdArray = polydata.getCellData().getArrayByName('edge_id');
            const edgeIdData = edgeIdArray ? edgeIdArray.getData() : null;

            const edges = [];
            let offset = 0;
            let cellIndex = 0;
            while (offset < linesData.length) {
                const numPts = linesData[offset];
                const positions = [];
                for (let i = 0; i < numPts; i++) {
                    const ptId = linesData[offset + 1 + i];
                    positions.push(pointsData[ptId * 3], pointsData[ptId * 3 + 1], pointsData[ptId * 3 + 2]);
                }
                const edgeId = edgeIdData ? edgeIdData[cellIndex] : cellIndex;
                edges.push({ edgeId, positions });
                offset += numPts + 1;
                cellIndex++;
            }
            return edges;
        }

        function clearFaceMesh() {
            if (faceMesh) {
                scene.remove(faceMesh);
                faceMesh.geometry.dispose();
                faceMesh.material.dispose();
                faceMesh = null;
                faceTriangleIds = null;
            }
        }

        function clearEdgeLines() {
            edgeLines.forEach(line => {
                scene.remove(line);
                line.geometry.dispose();
                line.material.dispose();
            });
            edgeLines.clear();
        }

        function loadFaceMesh(url) {
            fetch(url).then(r => r.arrayBuffer()).then(buf => {
                const { vertices, indices, faceIds } = parseFaceMeshVTP(buf);
                clearFaceMesh();
                if (vertices.length === 0) return;

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geometry.setIndex(indices);
                geometry.computeVertexNormals();

                const material = new THREE.MeshPhongMaterial({
                    color: 0x9aa0a6,
                    side: THREE.DoubleSide,
                    flatShading: false,
                    polygonOffset: true,
                    polygonOffsetFactor: 1,
                    polygonOffsetUnits: 1,
                });

                faceMesh = new THREE.Mesh(geometry, material);
                faceTriangleIds = faceIds;
                scene.add(faceMesh);
                fitCameraToModel();
                document.getElementById('viewportHint').style.display = 'none';
            }).catch(err => {
                console.error('[CADabra Hierarchy] Failed to load mesh:', err);
            });
        }

        function loadEdgeLines(url) {
            fetch(url).then(r => r.arrayBuffer()).then(buf => {
                const edges = parseEdgeVTP(buf);
                clearEdgeLines();
                const material = new THREE.LineBasicMaterial({ color: 0x555555 });
                edges.forEach(({ edgeId, positions }) => {
                    if (positions.length < 6) return;
                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    const line = new THREE.Line(geometry, material.clone());
                    edgeLines.set(edgeId, line);
                    scene.add(line);
                });
            }).catch(err => {
                console.error('[CADabra Hierarchy] Failed to load edges:', err);
            });
        }

        function fitCameraToModel() {
            const box = new THREE.Box3();
            if (faceMesh) box.expandByObject(faceMesh);
            edgeLines.forEach(line => box.expandByObject(line));
            if (box.isEmpty()) return;
            fitCameraToBox(box);
        }

        function fitCameraToBox(box, margin = 2.0) {
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z, 1e-6);
            const fov = camera.fov * (Math.PI / 180);
            let dist = Math.abs(maxDim / 2 / Math.tan(fov / 2)) * margin;

            const dir = camera.position.clone().sub(controls.target);
            if (dir.lengthSq() < 1e-9) dir.set(1, 1, 1);
            dir.normalize();

            camera.position.copy(center).add(dir.multiplyScalar(dist));
            camera.near = Math.max(dist / 1000, 0.001);
            camera.far = dist * 1000;
            camera.updateProjectionMatrix();
            camera.lookAt(center);
            controls.target.copy(center);
            controls.update();
        }

        // Extract the triangles belonging to one CAD face into a standalone geometry
        function extractFaceGeometry(faceId) {
            if (!faceMesh || !faceTriangleIds) return null;
            const indices = faceMesh.geometry.index.array;
            const positions = faceMesh.geometry.attributes.position.array;

            const outIndices = [];
            const vertexMap = new Map();
            let vertexCount = 0;

            for (let t = 0; t < faceTriangleIds.length; t++) {
                if (faceTriangleIds[t] !== faceId) continue;
                const i1 = indices[t * 3], i2 = indices[t * 3 + 1], i3 = indices[t * 3 + 2];
                for (const idx of [i1, i2, i3]) {
                    if (!vertexMap.has(idx)) vertexMap.set(idx, vertexCount++);
                }
                outIndices.push(vertexMap.get(i1), vertexMap.get(i2), vertexMap.get(i3));
            }
            if (outIndices.length === 0) return null;

            const outVertices = new Float32Array(vertexCount * 3);
            for (const [origIdx, newIdx] of vertexMap.entries()) {
                outVertices[newIdx * 3] = positions[origIdx * 3];
                outVertices[newIdx * 3 + 1] = positions[origIdx * 3 + 1];
                outVertices[newIdx * 3 + 2] = positions[origIdx * 3 + 2];
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(outVertices, 3));
            geometry.setIndex(outIndices);
            geometry.computeVertexNormals();
            return geometry;
        }

        function clearHighlight() {
            highlightMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
            highlightMeshes = [];
            highlightLines.forEach(l => { scene.remove(l); l.geometry.dispose(); l.material.dispose(); });
            highlightLines = [];
        }

        // Highlight the given set of FACE/EDGE geom_ids (union of a tree node + its descendants)
        function highlightGeomIds(faceIds, edgeIds) {
            clearHighlight();
            const box = new THREE.Box3();
            let any = false;

            faceIds.forEach(faceId => {
                const geometry = extractFaceGeometry(faceId);
                if (!geometry) return;
                const material = new THREE.MeshPhongMaterial({
                    color: 0xffaa00,
                    emissive: 0xff6600,
                    emissiveIntensity: 0.3,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.95,
                    polygonOffset: true,
                    polygonOffsetFactor: -1,
                    polygonOffsetUnits: -1,
                });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                highlightMeshes.push(mesh);
                box.expandByObject(mesh);
                any = true;
            });

            edgeIds.forEach(edgeId => {
                const base = edgeLines.get(edgeId);
                if (!base) return;
                const geometry = base.geometry.clone();
                const material = new THREE.LineBasicMaterial({ color: 0x00e5ff, linewidth: 4 });
                const line = new THREE.Line(geometry, material);
                scene.add(line);
                highlightLines.push(line);
                box.expandByObject(line);
                any = true;
            });

            if (any && !box.isEmpty()) fitCameraToBox(box, 3.0);
        }

        // Recursively collect all FACE/EDGE geom_ids under (and including) a tree node
        function collectGeomIds(node, faceIds, edgeIds) {
            if (node.type === 'FACE' && node.geom_id !== undefined) faceIds.push(node.geom_id);
            if (node.type === 'EDGE' && node.geom_id !== undefined) edgeIds.push(node.geom_id);
            if (node.children) {
                node.children.forEach(child => collectGeomIds(child, faceIds, edgeIds));
            }
        }

        function selectTreeNode(node, header) {
            if (selectedHeader) selectedHeader.classList.remove('selected');
            if (selectedHeader === header) {
                // Clicking the already-selected node deselects it
                selectedHeader = null;
                clearHighlight();
                return;
            }
            selectedHeader = header;
            header.classList.add('selected');

            const faceIds = [];
            const edgeIds = [];
            collectGeomIds(node, faceIds, edgeIds);
            highlightGeomIds(faceIds, edgeIds);
        }

        // ============================================================
        // Tree rendering
        // ============================================================

        // Render the tree
        function renderTree(node, isRoot = false) {
            const div = document.createElement('div');
            div.className = `tree-node ${isRoot ? 'tree-root' : ''} type-${node.type}`;

            const hasChildren = node.children && node.children.length > 0;
            const header = document.createElement('div');
            header.className = 'node-header';

            // Toggle button
            const toggle = document.createElement('span');
            toggle.className = `toggle-btn ${hasChildren ? 'has-children' : ''}`;
            toggle.textContent = hasChildren ? '▼' : '';  // Down arrow or empty

            // Icon
            const icon = document.createElement('span');
            icon.className = 'node-icon';
            icon.textContent = TYPE_ICONS[node.type] || '?';

            // Type label
            const typeLabel = document.createElement('span');
            typeLabel.className = 'node-type';
            typeLabel.textContent = node.type;

            // Properties
            const props = document.createElement('span');
            props.className = 'node-props';
            if (node.properties) {
                const propStrs = [];
                if (node.properties.surface_type) propStrs.push(node.properties.surface_type);
                if (node.properties.curve_type) propStrs.push(node.properties.curve_type);
                props.textContent = propStrs.length > 0 ? `(${propStrs.join(', ')})` : '';
            }

            // Child count
            const count = document.createElement('span');
            count.className = 'node-count';
            if (hasChildren) {
                count.textContent = `${node.children.length} children`;
            } else if (node.children_count) {
                count.textContent = `${node.children_count} children`;
            } else if (node.vertex_count) {
                count.textContent = `${node.vertex_count} vertices`;
            }

            // Truncated indicator
            if (node.truncated) {
                const truncated = document.createElement('span');
                truncated.className = 'truncated-indicator';
                truncated.textContent = ' (truncated)';
                count.appendChild(truncated);
            }

            header.appendChild(toggle);
            header.appendChild(icon);
            header.appendChild(typeLabel);
            header.appendChild(props);
            header.appendChild(count);
            div.appendChild(header);

            // Click to select + highlight in the 3D viewport
            header.addEventListener('click', (e) => {
                e.stopPropagation();
                selectTreeNode(node, header);
            });

            // Children container
            if (hasChildren) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'children-container';

                node.children.forEach(child => {
                    childrenContainer.appendChild(renderTree(child, false));
                });

                div.appendChild(childrenContainer);

                // Toggle click handler
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isCollapsed = childrenContainer.classList.toggle('collapsed');
                    toggle.textContent = isCollapsed ? '▶' : '▼';  // Right or down arrow
                });

                // Double-click to expand/collapse
                header.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    const isCollapsed = childrenContainer.classList.toggle('collapsed');
                    toggle.textContent = isCollapsed ? '▶' : '▼';
                });
            }

            // Store reference for search
            allNodeElements.push({
                element: div,
                header: header,
                node: node,
                type: node.type,
                properties: node.properties,
            });

            return div;
        }

        // Render summary
        function renderSummary(summary) {
            // Entity counts
            const countsDiv = document.getElementById('entityCounts');
            countsDiv.innerHTML = '';

            const entities = [
                ['Compounds', summary.total_compounds],
                ['Comp Solids', summary.total_compsolids],
                ['Solids', summary.total_solids],
                ['Shells', summary.total_shells],
                ['Faces', summary.total_faces],
                ['Wires', summary.total_wires],
                ['Edges', summary.total_edges],
                ['Vertices', summary.total_vertices],
            ];

            entities.forEach(([label, value]) => {
                if (value > 0) {
                    const row = document.createElement('div');
                    row.className = 'stat-row';
                    row.innerHTML = `<span class="stat-label">${label}</span><span class="stat-value">${value}</span>`;
                    countsDiv.appendChild(row);
                }
            });

            // Surface types pie
            const surfaceDiv = document.getElementById('surfaceTypes');
            surfaceDiv.innerHTML = '';
            Object.entries(summary.surface_types || {}).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                const item = document.createElement('div');
                item.className = 'pie-item';
                const color = SURFACE_COLORS[type] || '#666';
                item.innerHTML = `<span class="pie-color" style="background:${color}"></span>${type}: ${count}`;
                surfaceDiv.appendChild(item);
            });

            // Curve types pie
            const curveDiv = document.getElementById('curveTypes');
            curveDiv.innerHTML = '';
            Object.entries(summary.curve_types || {}).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                const item = document.createElement('div');
                item.className = 'pie-item';
                const color = CURVE_COLORS[type] || '#666';
                item.innerHTML = `<span class="pie-color" style="background:${color}"></span>${type}: ${count}`;
                curveDiv.appendChild(item);
            });
        }

        // Load hierarchy data
        function loadHierarchy(data) {
            hierarchyData = data;
            allNodeElements = [];
            selectedHeader = null;
            clearHighlight();

            const treePanel = document.getElementById('treePanel');
            treePanel.innerHTML = '';

            if (data.root) {
                treePanel.appendChild(renderTree(data.root, true));
            }

            if (data.summary) {
                renderSummary(data.summary);
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filterType = document.getElementById('filterType').value;

            allNodeElements.forEach(({ element, header, node, type, properties }) => {
                let visible = true;

                // Filter by type
                if (filterType && type !== filterType) {
                    visible = false;
                }

                // Search in type and properties
                if (query) {
                    const typeMatch = type.toLowerCase().includes(query);
                    let propMatch = false;
                    if (properties) {
                        propMatch = Object.values(properties).some(v =>
                            String(v).toLowerCase().includes(query)
                        );
                    }
                    if (!typeMatch && !propMatch) {
                        visible = false;
                    }
                }

                element.style.display = visible ? '' : 'none';

                // Highlight matching
                if (visible && query) {
                    header.style.background = '#2d4a2d';
                } else if (header !== selectedHeader) {
                    header.style.background = '';
                }
            });
        });

        // Filter by type
        document.getElementById('filterType').addEventListener('change', (e) => {
            document.getElementById('searchInput').dispatchEvent(new Event('input'));
        });

        // Expand all
        document.getElementById('expandAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.children-container').forEach(el => {
                el.classList.remove('collapsed');
            });
            document.querySelectorAll('.toggle-btn.has-children').forEach(el => {
                el.textContent = '▼';
            });
        });

        // Collapse all
        document.getElementById('collapseAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.children-container').forEach(el => {
                el.classList.add('collapsed');
            });
            document.querySelectorAll('.toggle-btn.has-children').forEach(el => {
                el.textContent = '▶';
            });
        });

        // Fit view
        document.getElementById('fitViewBtn').addEventListener('click', () => {
            fitCameraToModel();
        });

        // Copy JSON
        document.getElementById('copyJsonBtn').addEventListener('click', () => {
            if (hierarchyData) {
                navigator.clipboard.writeText(JSON.stringify(hierarchyData, null, 2))
                    .then(() => alert('JSON copied to clipboard!'))
                    .catch(err => console.error('Failed to copy:', err));
            }
        });

        // Message handler for ComfyUI integration
        window.addEventListener('message', (event) => {
            const data = event.data;

            if (data.type === 'LOAD_HIERARCHY') {
                // Fetch the JSON file
                fetch(data.jsonUrl)
                    .then(response => response.json())
                    .then(jsonData => {
                        loadHierarchy(jsonData);
                    })
                    .catch(err => {
                        console.error('Failed to load hierarchy:', err);
                        document.getElementById('treePanel').innerHTML =
                            '<div class="loading">Failed to load hierarchy data</div>';
                    });

                clearFaceMesh();
                clearEdgeLines();
                document.getElementById('viewportHint').style.display = 'block';
                if (data.meshUrl) loadFaceMesh(data.meshUrl);
                if (data.edgesUrl) loadEdgeLines(data.edgesUrl);
            } else if (data.type === 'EXPAND_ALL') {
                document.getElementById('expandAllBtn').click();
            } else if (data.type === 'COLLAPSE_ALL') {
                document.getElementById('collapseAllBtn').click();
            }
        });

        // Signal ready
        initViewport();
        window.parent.postMessage({ type: 'HIERARCHY_VIEWER_READY' }, '*');
        console.log('[CADabra Hierarchy] Loaded successfully');
    </script>
</body>
</html>
